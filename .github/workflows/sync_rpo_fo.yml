name: RPO FO Sync

on:
  schedule:
    # Každú nedeľu o 4:00 UTC (= 6:00 SK letný čas)
    - cron: '0 4 * * 0'
  workflow_dispatch: # Možnosť spustiť manuálne z GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install psql
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Download sync state
        uses: actions/cache@v4
        with:
          path: rpo_sync_state.json
          key: rpo-sync-state-${{ github.run_id }}
          restore-keys: |
            rpo-sync-state-

      - name: Run RPO FO Sync
        env:
          COCKROACH_URL: ${{ secrets.COCKROACH_URL }}
        run: |
          python3 sync_rpo_fo.py

      - name: Upload sync state
        uses: actions/cache@v4
        with:
          path: rpo_sync_state.json
          key: rpo-sync-state-${{ github.run_id }}
